 

media:
  input: content/images
  output: /content/images
  extensions: [jpg, jpeg, png, webp, gif]

content:
  # Articles Collection
  - name: articles
    label: Articles
    type: collection
    path: content/articles
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: date
        type: date
        required: true
      - name: author
        type: string
      - name: image
        type: image
        required: false
        description: "Featured image for the article"
      - name: tags
        type: string
        list: true
      - name: body
        type: rich-text
        required: true

  # Announcements Collection
  - name: announcement
    label: Announcement
    type: collection
    path: content/announcement
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: date
        type: date
        required: true
      - name: body
        type: rich-text
        required: true

  # Team Members Collection
  - name: team
    label: Team Members
    type: collection
    path: content/teams
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        required: true
      - name: role
        type: string
        required: true
      - name: image
        type: image
        required: false
        description: "Photo of the team member"
      - name: tags
        type: string
        list: true
      - name: body
        type: rich-text
        required: true

  #  Services/Blogs Collection
  - name: services
    label: Blogs
    type: collection
    path: content/services
    format: yaml-frontmatter
    fields:
      - name: title
        type: string
        label: Title
        required: true
        description: "Blog post title"
      
      - name: image
        type: image
        label: Featured Image
        required: false
        description: "Upload a featured image (recommended: 1200x675px, 16:9 ratio)"
        upload: /content/images/
      
      - name: date
        type: date
        label: Published Date
        required: false
        default: "{{now}}"
      
      - name: author
        type: string
        label: Author
        required: false
        default: "YCI Team"
      
      - name: body
        type: rich-text
        label: Content
        required: true
        description: "Main blog content (supports Markdown)"