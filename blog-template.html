<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  
  <!-- ✅ PAGE TITLE -->
  <title>{{PAGE_TITLE}}</title>
  
  <!-- ✅ FACEBOOK OPEN GRAPH TAGS -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="{{OG_TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:image" content="{{OG_IMAGE}}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:url" content="{{OG_URL}}">
  <meta property="og:site_name" content="YCI Bangladesh">
  
  <!-- ✅ TWITTER CARD TAGS -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{OG_TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <meta name="twitter:image" content="{{OG_IMAGE}}">
  
  <!-- ✅ STANDARD META -->
  <meta name="description" content="{{OG_DESCRIPTION}}">
  
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/content/images/IMG_5811.png">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    /* ✅ Base Reset */
    * {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      /* ✅ Remove smooth scroll on mobile - causes vibration */
      scroll-behavior: auto;
    }
    
    @media (min-width: 768px) {
      html {
        scroll-behavior: smooth; /* ✅ Keep smooth scroll on desktop */
      }
    }
    
    body {
      background: linear-gradient(135deg, rgba(17, 23, 87, 0.85), rgba(13, 71, 161, 0.7), rgba(37, 170, 33, 0.6));
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      /* ✅ Enable smooth scrolling without vibration */
      -webkit-overflow-scrolling: touch;
    }
    
    /* ✅ Glass Effect - Disabled on mobile for performance */
    .pure-glass {
      background: rgba(255, 255, 255, 0.15);
      /* ✅ Only apply blur on desktop */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 1rem;
      /* ✅ Performance hint */
      will-change: transform;
      contain: layout style paint;
    }
    
    /* ✅ Disable heavy effects on mobile */
    @media (max-width: 767px) {
      .pure-glass {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: rgba(255, 255, 255, 0.1); /* Simpler background */
      }
    }
    
    .nav-glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      /* ✅ Prevent navbar from causing scroll jitter */
      transform: translateZ(0);
      will-change: transform;
    }
    
    @media (max-width: 767px) {
      .nav-glass {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background: rgba(0, 0, 0, 0.8); /* Solid background on mobile */
      }
    }
    
    /* ✅ Blog Content - Optimized Typography */
    .blog-content {
      line-height: 1.8;
      color: rgba(255,255,255,0.95);
      font-size: clamp(0.95rem, 2.5vw, 1.05rem);
      word-wrap: break-word;
      overflow-wrap: break-word;
      /* ✅ Prevent layout shift during scroll */
      contain: content;
    }
    
    .blog-content h1 {
      font-size: clamp(1.5rem, 5vw, 2rem);
      font-weight: 700;
      margin: 2rem 0 1rem;
      color: white;
      line-height: 1.3;
      word-break: break-word;
    }
    
    .blog-content h2 {
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      font-weight: 600;
      margin: 1.5rem 0 0.75rem;
      color: white;
      line-height: 1.3;
    }
    
    .blog-content h3 {
      font-size: clamp(1.1rem, 3.5vw, 1.25rem);
      font-weight: 600;
      margin: 1.25rem 0 0.5rem;
      color: white;
    }
    
    .blog-content p {
      margin: 1rem 0;
      color: rgba(255,255,255,0.95);
    }
    
    .blog-content a {
      color: #60A5FA;
      text-decoration: none;
      border-bottom: 2px solid rgba(96, 165, 250, 0.4);
      transition: all 0.2s ease;
      word-break: break-word;
    }
    
    .blog-content a:hover {
      color: #93C5FD;
      border-color: #93C5FD;
    }
    
    .blog-content img {
      max-width: 100%;
      height: auto;
      border-radius: 0.5rem;
      margin: 1.5rem 0;
      display: block;
      /* ✅ Prevent image load from causing layout shift */
      aspect-ratio: 16/9;
      object-fit: cover;
      background: rgba(255,255,255,0.1);
    }
    
    .blog-content blockquote {
      border-left: 4px solid #4FD1C5;
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
      font-style: italic;
      background: rgba(255,255,255,0.05);
      border-radius: 0 0.5rem 0.5rem 0;
    }
    
    .blog-content ul,
    .blog-content ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }
    
    .blog-content li {
      margin: 0.5rem 0;
    }
    
    /* ✅ Touch-Friendly Buttons - No heavy transitions on mobile */
    .action-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 9999px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      border: none;
      min-height: 44px;
      min-width: 44px;
      -webkit-tap-highlight-color: transparent;
      /* ✅ Simplified transition for mobile */
      transition: background-color 0.2s ease;
    }
    
    @media (min-width: 768px) {
      .action-btn {
        transition: all 0.3s ease;
      }
      .action-btn:hover {
        transform: translateY(-2px);
      }
    }
    
    .action-btn:active {
      transform: scale(0.98);
    }
    
    .action-btn.primary {
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
    }
    
    .action-btn.whatsapp {
      background: #25D366;
      color: white;
    }
    
    .action-btn.facebook {
      background: #1877F2;
      color: white;
    }
    
    .button-group {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    
    @media (max-width: 640px) {
      .pure-glass {
        padding: 1rem;
        border-radius: 0.75rem;
      }
      
      .blog-content {
        font-size: 1rem;
        padding: 0 0.25rem;
      }
      
      .button-group {
        flex-direction: column;
        align-items: stretch;
      }
      
      .action-btn {
        width: 100%;
        justify-content: center;
      }
    }
    
    /* ✅ iOS Safari Fixes */
    @supports (-webkit-touch-callout: none) {
      .pure-glass,
      .nav-glass {
        -webkit-backdrop-filter: blur(12px);
      }
    }
    
    /* ✅ Disable blur on low-end devices via prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
      .pure-glass,
      .nav-glass {
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
      }
    }
  </style>
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4FD1C5',
            secondary: '#2C5282',
          }
        }
      }
    }
  </script>
</head>
<body class="flex flex-col">

  <!-- Navbar - Performance Optimized -->
  <nav class="fixed w-full top-0 z-50 nav-glass">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
      <a href="/index.html" class="text-white font-bold text-lg flex items-center gap-2">
        <i class="fas fa-arrow-left text-sm"></i>
        <span class="hidden sm:inline">YCI Bangladesh</span>
        <span class="sm:hidden">Back</span>
      </a>
      <a href="/services.html" class="text-white/80 hover:text-white transition text-sm">
        All Blogs →
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="pt-20 pb-12 flex-grow">
    <article class="max-w-4xl mx-auto px-4">
      
      <div class="pure-glass p-4 md:p-8 mb-6">
        
        <!-- Blog Title -->
        <h1 class="text-2xl md:text-4xl font-bold text-white mb-4 md:mb-6 leading-tight">
          {{BLOG_TITLE}}
        </h1>
        
        <!-- Blog Image - With aspect ratio to prevent layout shift -->
        <div class="mb-6 md:mb-8 rounded-xl overflow-hidden">
          <img src="{{BLOG_IMAGE}}" alt="{{OG_TITLE}}" 
               class="w-full h-auto"
               loading="lazy"
               onerror="this.style.display='none'">
        </div>
        
        <!-- Meta Info -->
        <div class="flex flex-wrap gap-3 text-white/70 text-sm mb-6 md:mb-8 pb-4 md:pb-6 border-b border-white/20">
          <span class="flex items-center gap-2">
            <i class="far fa-calendar"></i>
            {{BLOG_DATE}}
          </span>
          <span class="flex items-center gap-2">
            <i class="far fa-user"></i>
            {{BLOG_AUTHOR}}
          </span>
        </div>
        
        <!-- Share Buttons -->
        <div class="button-group mb-6 md:mb-8 pb-4 md:pb-6 border-b border-white/20">
          <button onclick="shareToFacebook()" class="action-btn facebook">
            <i class="fab fa-facebook"></i>
            <span>Share on Facebook</span>
          </button>
          <button onclick="shareToWhatsApp()" class="action-btn whatsapp">
            <i class="fab fa-whatsapp"></i>
            <span>WhatsApp</span>
          </button>
          <button onclick="copyLink()" class="action-btn primary">
            <i class="fas fa-link"></i>
            <span>Copy Link</span>
          </button>
        </div>
        
        <!-- Blog Content -->
        <div class="blog-content">
          {{BLOG_CONTENT}}
        </div>
      </div>
      
    </article>
  </main>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-300 py-6 md:py-8 text-center text-sm">
    <p class="px-4">&copy; 2025 YCI Bangladesh. All rights reserved.</p>
  </footer>

  <script>
    function shareToFacebook() {
      const url = encodeURIComponent(window.location.href);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}`, '_blank', 'width=600,height=400');
    }
    
    function shareToWhatsApp() {
      const title = encodeURIComponent('{{OG_TITLE}}');
      const url = encodeURIComponent(window.location.href);
      window.open(`https://wa.me/?text=*${title}*%0A%0A${url}`, '_blank');
    }
    
    function copyLink() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(window.location.href).then(() => {
          showCopyFeedback();
        });
      } else {
        const textarea = document.createElement('textarea');
        textarea.value = window.location.href;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showCopyFeedback();
      }
    }
    
    function showCopyFeedback() {
      const btn = event.target.closest('.action-btn');
      if (btn) {
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        btn.classList.add('bg-green-500');
        setTimeout(() => {
          btn.innerHTML = originalText;
          btn.classList.remove('bg-green-500');
        }, 2000);
      }
    }
    
    /* ✅ Optional: Further optimize scroll performance */
    document.addEventListener('DOMContentLoaded', function() {
      // Remove heavy effects if device is low-end
      if (navigator.deviceMemory && navigator.deviceMemory < 4) {
        document.querySelectorAll('.pure-glass, .nav-glass').forEach(el => {
          el.style.backdropFilter = 'none';
          el.style.webkitBackdropFilter = 'none';
        });
      }
    });
  </script>
</body>
</html>
