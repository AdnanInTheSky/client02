  <script>
    // --- YAML Parser ---
    function parseYAML(yamlStr) {
      const result = {};
      yamlStr.trim().split('\n').forEach(line => {
        const idx = line.indexOf(':');
        if (idx === -1) return;
        let key = line.slice(0, idx).trim();
        let val = line.slice(idx + 1).trim().replace(/^[\"']|[\"']$/g, '');
        if (val === 'true') val = true;
        if (val === 'false') val = false;
        if (!isNaN(val) && val !== '') val = Number(val);
        result[key] = val;
      });
      return result;
    }

    // --- Enhanced Markdown to HTML ---
    function markdownToHTML(md) {
      let html = md
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Code blocks
      html = html.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');

      // Headings
      html = html.replace(/^###### (.+)$/gm, '<h6>$1</h6>');
      html = html.replace(/^##### (.+)$/gm, '<h5>$1</h5>');
      html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
      html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
      html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
      html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

      // Bold / Italic
      html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');

      // Inline code
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

      // Links & Images
      html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
      html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img alt="$1" src="$2" class="my-4" />');

      // Blockquotes
      html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');

      // Tables (GitHub-style)
      const tableRegex = /^\|(.+)\|\s*$/gm;
      let inTable = false;
      
      html = html.replace(tableRegex, (match, content) => {
        const cells = content.split('|').map(c => c.trim()).filter(c => c);
        if (cells.length === 0) return match;
        
        if (!inTable) {
          inTable = true;
          const headers = cells.map(c => `<th>${c}</th>`).join('');
          return `<table><thead><tr>${headers}</tr></thead><tbody>`;
        }
        
        // Check if separator row
        if (cells.every(c => /^[-:]+$/.test(c))) {
          return '';
        }
        
        const tds = cells.map(c => `<td>${c}</td>`).join('');
        return `<tr>${tds}</tr>`;
      });
      
      // Close table if opened
      if (inTable) {
        html = html.replace(/(<\/tr>\s*)$/, '</tbody></table>');
      }

      // Lists
      html = html.replace(/^(\s*)[-*+]\s+(.+)$/gm, '<li>$2</li>');
      html = html.replace(/(<li>.*?<\/li>)/gs, '<ul>$1</ul>');
      html = html.replace(/^(\s*)\d+\.\s+(.+)$/gm, '<li>$2</li>');
      
      // Fix nested lists
      html = html.replace(/<\/ul>\s*<ul>/g, '');

      // Paragraphs
      html = html
        .split('\n\n')
        .map(paragraph => {
          paragraph = paragraph.trim();
          if (!paragraph) return '';
          if (/^<(h[1-6]|ul|ol|pre|blockquote|img|table|tr|th|td|tbody|thead|code)/.test(paragraph)) {
            return paragraph;
          }
          return `<p>${paragraph.replace(/\n/g, '<br>')}</p>`;
        })
        .join('\n');

      return html;
    }

    // ✅ Share Functions (UPDATED FOR FACEBOOK)
    function copyArticleLink() {
      navigator.clipboard.writeText(window.location.href).then(() => {
        const btn = event.currentTarget;
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
        setTimeout(() => btn.innerHTML = original, 2000);
      });
    }

    function shareToWhatsApp() {
      const title = encodeURIComponent(document.getElementById('article-title').textContent);
      const url = encodeURIComponent(window.location.href);
      window.open(`https://wa.me/?text=${title}%20${url}`, '_blank', 'width=600,height=400');
    }

    function shareToFacebook() {
      const url = encodeURIComponent(window.location.href);
      const quote = encodeURIComponent(document.getElementById('article-title').textContent);
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${url}&quote=${quote}`, '_blank', 'width=600,height=400');
    }

    function shareToTwitter() {
      const title = encodeURIComponent(document.getElementById('article-title').textContent);
      const url = encodeURIComponent(window.location.href);
      window.open(`https://twitter.com/intent/tweet?text=${title}&url=${url}`, '_blank', 'width=600,height=400');
    }

    // ✅ Update Open Graph tags dynamically (for platforms that support it)
    function updateOpenGraphTags(meta, body, url) {
      const description = body.replace(/[#*_\[\]`>]/g, '').substring(0, 160) + '...';
      
      const setMeta = (property, content, name = false) => {
        const selector = name ? `meta[name="${property}"]` : `meta[property="${property}"]`;
        let tag = document.querySelector(selector);
        if (!tag) {
          tag = document.createElement('meta');
          name ? tag.setAttribute('name', property) : tag.setAttribute('property', property);
          document.head.appendChild(tag);
        }
        tag.setAttribute('content', content);
      };
      
      setMeta('og:title', meta.title || 'YCI Article');
      setMeta('og:description', description);
      setMeta('og:image', meta.image || '/content/images/IMG_5811.png');
      setMeta('og:url', url);
      setMeta('og:type', 'article');
      setMeta('twitter:card', 'summary_large_image', true);
      setMeta('twitter:title', meta.title || 'YCI Article', true);
      setMeta('twitter:description', description, true);
      if (meta.image) setMeta('twitter:image', meta.image, true);
      
      // Update canonical link
      let canonical = document.querySelector('link[rel="canonical"]');
      if (!canonical) {
        canonical = document.createElement('link');
        canonical.setAttribute('rel', 'canonical');
        document.head.appendChild(canonical);
      }
      canonical.setAttribute('href', url);
    }

    // ✅ Main: Load Article from URL Parameter
    async function loadArticle() {
      // ✅ Read from URL parameter: ?file=articles/xyz.md
      const params = new URLSearchParams(window.location.search);
      let id = params.get('file');
      
      // Fallback to sessionStorage for backwards compatibility
      if (!id) {
        id = sessionStorage.getItem('selectedFile');
      }

      // Validate
      if (!id || !id.startsWith('articles/')) {
        document.getElementById('article-body').innerHTML = `
          <div class="text-center py-12">
            <i class="fas fa-exclamation-circle text-4xl text-amber-400 mb-4"></i>
            <p class="text-red-300 mb-4">Article not found or invalid link.</p>
            <a href="articles.html" class="text-blue-300 hover:underline inline-flex items-center gap-1">
              <i class="fas fa-arrow-left"></i> Back to Articles
            </a>
          </div>
        `;
        document.getElementById('article-title').textContent = 'Article Not Found';
        return;
      }

      try {
        const response = await fetch(`/content/${id}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        
        const text = await response.text();
        const parts = text.split('---');
        if (parts.length < 3) throw new Error('Invalid Markdown format');

        const frontmatter = parts[1];
        const body = parts.slice(2).join('---').trim();
        const meta = parseYAML(frontmatter);
        const htmlBody = markdownToHTML(body);

        // Update image
        const imgEl = document.getElementById('article-image');
        if (meta.image) {
          imgEl.src = meta.image;
          imgEl.classList.remove('hidden');
          imgEl.onerror = function() { this.classList.add('hidden'); };
        } else {
          imgEl.classList.add('hidden');
        }

        // Update metadata
        document.getElementById('article-title').textContent = meta.title || 'Untitled';
        document.getElementById('article-author').textContent = `By ${meta.author || 'YCI Team'}`;
        document.getElementById('article-date').textContent = meta.date
          ? new Date(meta.date).toLocaleDateString('en-US', { day: 'numeric', month: 'long', year: 'numeric' })
          : 'Date Unknown';
        document.getElementById('article-body').innerHTML = htmlBody;
        
        // Show share buttons
        document.getElementById('share-buttons').style.display = 'flex';
        
        // Update page title
        const pageTitle = `${meta.title || 'Article'} - YCI`;
        document.title = pageTitle;
        
        // Update Open Graph tags dynamically
        updateOpenGraphTags(meta, body, window.location.href);
        
      } catch (error) {
        console.error('Failed to load article:', error);
        document.getElementById('article-body').innerHTML = `
          <div class="text-center py-12">
            <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-4"></i>
            <p class="text-red-300 mb-4">Failed to load article.</p>
            <button onclick="window.location.reload()" class="text-blue-300 hover:underline">Try Again</button>
          </div>
        `;
        document.getElementById('article-title').textContent = 'Error Loading Article';
      }
    }

    // Load on page ready
    document.addEventListener('DOMContentLoaded', loadArticle);
  </script>
</body>
